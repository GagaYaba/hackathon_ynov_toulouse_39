<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TechCorp Assistant</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/techcorp-mascot.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='assets/techcorp-mascot.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body data-theme="dark">
    <div class="app-shell">
      <button
        id="mobileMenuButton"
        class="mobile-menu-button"
        type="button"
        aria-label="Ouvrir la navigation"
        aria-controls="sidebar"
        aria-expanded="false"
      >
        <i data-lucide="menu" data-fallback="=" aria-hidden="true"></i>
      </button>

      <aside id="sidebar" class="sidebar" aria-label="Navigation de conversation">
        <div class="brand-block">
          <img class="brand-mark" src="{{ url_for('static', filename='assets/techcorp-mascot.png') }}" alt="TechCorp mascot">
          <div>
            <p class="brand-name">TechCorp</p>
            <p class="brand-context">DEV WEB</p>
          </div>
        </div>

        <button id="newChatButton" class="new-chat-button" type="button">
          <i data-lucide="square-pen" data-fallback="+" aria-hidden="true"></i>
          Nouveau chat
        </button>
        <button id="searchChatsButton" class="search-chats-button" type="button">
          <i data-lucide="search" data-fallback="?" aria-hidden="true"></i>
          Rechercher dans les chats
        </button>

        <section class="conversation-panel" aria-label="Organisation des conversations">
          <div class="sidebar-section">
            <div class="section-header">
              <button id="foldersToggle" class="section-toggle" type="button" aria-expanded="true">
                <i class="section-chevron" data-lucide="chevron-down" data-fallback="v" aria-hidden="true"></i>
                <i data-lucide="folder" data-fallback="[]" aria-hidden="true"></i>
                Dossiers
              </button>
              <button id="addFolderButton" class="section-action" type="button" aria-label="Cr&eacute;er un dossier">
                <i data-lucide="plus" data-fallback="+" aria-hidden="true"></i>
              </button>
            </div>
            <div id="folderList" class="folder-list"></div>
          </div>

          <div class="sidebar-section">
            <button id="recentsToggle" class="section-toggle section-toggle-full" type="button" aria-expanded="true">
              <i class="section-chevron" data-lucide="chevron-down" data-fallback="v" aria-hidden="true"></i>
              <i data-lucide="message-square" data-fallback="-" aria-hidden="true"></i>
              R&eacute;cents
            </button>
            <div id="recentConversationList" class="conversation-list"></div>
          </div>
        </section>

        <div class="sidebar-meta" aria-live="polite">
          <div class="meta-item">
            <span class="meta-label">Statut Ollama</span>
            <span id="statusBadge" class="status-badge status-checking">V&eacute;rification...</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Mod&egrave;le</span>
            <strong id="modelName">{{ model }}</strong>
          </div>
        </div>
      </aside>

      <div id="sidebarOverlay" class="sidebar-overlay" hidden></div>

      <main class="chat-main">
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Basculer en mode clair" title="Basculer en mode clair">
          <i data-lucide="sun" data-fallback="*" aria-hidden="true"></i>
        </button>

        <section class="chat-stage" aria-label="Conversation avec l'assistant financier">
          <div id="welcomePanel" class="welcome-panel">
            <div class="welcome-content">
              <h2>Comment puis-je vous aider&nbsp;?</h2>
              <div class="suggestion-grid" aria-label="Suggestions de questions">
                <button class="suggestion-card" type="button" data-suggestion="Explique-moi ce qu&rsquo;est la TVA">
                  Explique-moi ce qu&rsquo;est la TVA
                </button>
                <button class="suggestion-card" type="button" data-suggestion="R&eacute;sume les risques d&rsquo;une hausse des taux">
                  R&eacute;sume les risques d&rsquo;une hausse des taux
                </button>
                <button class="suggestion-card" type="button" data-suggestion="Analyse les points cl&eacute;s d&rsquo;un bilan financier">
                  Analyse les points cl&eacute;s d&rsquo;un bilan financier
                </button>
              </div>
            </div>
          </div>

          <div id="chatMessages" class="chat-messages" aria-live="polite"></div>
          <div id="chat-bottom" class="chat-bottom" aria-hidden="true"></div>
        </section>

        <form id="chatForm" class="composer" aria-label="Envoyer une question">
          <div class="composer-inner">
            <button id="clearButton" class="clear-button" type="button">Vider</button>
            <label for="messageInput" class="sr-only">Votre question</label>
            <div class="input-shell">
              <textarea
                id="messageInput"
                name="message"
                rows="1"
                maxlength="2000"
                placeholder="Demander à l'Assistant..."
                required
              ></textarea>
              <button id="sendButton" class="send-button" type="submit" aria-label="Envoyer">
                <i data-lucide="arrow-up" data-fallback="^" aria-hidden="true"></i>
              </button>
            </div>
            <p class="warning">Assistant exp&eacute;rimental &mdash; ne pas saisir de donn&eacute;es sensibles.</p>
          </div>
        </form>
      </main>
    </div>

    <div id="modalOverlay" class="modal-overlay" hidden>
      <section
        class="modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
        aria-describedby="modalDescription"
      >
        <button id="modalCloseButton" class="modal-close-button" type="button" aria-label="Fermer">
          <i data-lucide="x" data-fallback="x" aria-hidden="true"></i>
        </button>
        <h2 id="modalTitle"></h2>
        <p id="modalDescription" class="modal-description"></p>
        <form id="modalForm" class="modal-form">
          <div id="modalField" class="modal-field">
            <label id="modalInputLabel" for="modalInput"></label>
            <input id="modalInput" type="text" autocomplete="off">
          </div>
          <div class="modal-actions">
            <button id="modalCancelButton" class="modal-secondary-button" type="button">Annuler</button>
            <button id="modalConfirmButton" class="modal-primary-button" type="submit">Valider</button>
          </div>
        </form>
      </section>
    </div>

    <div id="searchOverlay" class="search-overlay" hidden>
      <section
        class="search-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="searchTitle"
      >
        <button id="searchCloseButton" class="modal-close-button" type="button" aria-label="Fermer la recherche">
          <i data-lucide="x" data-fallback="x" aria-hidden="true"></i>
        </button>
        <h2 id="searchTitle">Rechercher dans les chats</h2>
        <label for="searchInput" class="sr-only">Recherche</label>
        <div class="search-input-shell">
          <i data-lucide="search" data-fallback="?" aria-hidden="true"></i>
          <input
            id="searchInput"
            type="text"
            autocomplete="off"
            placeholder="Rechercher une conversation ou un message..."
          >
        </div>
        <div id="searchResults" class="search-results" role="listbox" aria-label="R&eacute;sultats de recherche"></div>
      </section>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
